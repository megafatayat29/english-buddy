<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Buddy - Your Fun Learning Chatbot</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Nunito for a friendly, rounded look -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Nunito', 'sans-serif'],
                    },
                    colors: {
                        pastel: {
                            blue: '#AEC6CF',
                            pink: '#FFD1DC',
                            yellow: '#FDFD96',
                            green: '#77DD77',
                            purple: '#C3B1E1',
                            orange: '#FFB347'
                        }
                    },
                    animation: {
                        'bounce-slow': 'bounce 3s infinite',
                        'wiggle': 'wiggle 1s ease-in-out infinite',
                        'float': 'float 4s ease-in-out infinite',
                        'pop-in': 'popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                    },
                    keyframes: {
                        wiggle: {
                            '0%, 100%': { transform: 'rotate(-3deg)' },
                            '50%': { transform: 'rotate(3deg)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        popIn: {
                            '0%': { opacity: '0', transform: 'scale(0.8)' },
                            '100%': { opacity: '1', transform: 'scale(1)' },
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-pattern min-h-screen flex items-center justify-center p-4 md:p-8 font-sans text-gray-700 overflow-hidden relative">

    <!-- Decorative Elements in Background -->
    <div class="absolute top-10 left-10 w-24 h-24 bg-pastel-pink rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-float"></div>
    <div class="absolute bottom-20 right-10 w-32 h-32 bg-pastel-blue rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-float" style="animation-delay: 2s;"></div>
    <div class="absolute top-40 right-20 w-16 h-16 bg-pastel-yellow rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-float" style="animation-delay: 1s;"></div>
    
    <div class="sparkle top-20 left-1/4"></div>
    <div class="sparkle bottom-1/4 right-1/4" style="animation-delay: 0.5s;"></div>
    <div class="sparkle top-1/3 right-10" style="animation-delay: 1.5s;"></div>

    <div class="w-full max-w-4xl bg-white/90 backdrop-blur-md rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.1)] border-4 border-white flex flex-col md:flex-row overflow-hidden h-[85vh] animate-pop-in relative z-10">
        
        <div class="w-full md:w-1/3 bg-pastel-blue/20 p-6 flex flex-col items-center justify-center border-b md:border-b-0 md:border-r border-white relative">
            
            <!-- Welcome Header -->
            <h1 class="text-3xl font-extrabold text-indigo-800 mb-2 text-center drop-shadow-sm">
                English<br><span class="text-pastel-orange">Buddy!</span>
            </h1>
            <p class="text-sm text-center text-indigo-600 mb-6 font-semibold">Let's learn English together! 🌟</p>

            <!-- Cute SVG Mascot (Owl/Bird) -->
            <div class="relative w-40 h-40 mb-6 animate-float cursor-pointer" onclick="pokeMascot()" id="mascot-container">
                <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" class="w-full h-full drop-shadow-lg">
                    <!-- Body -->
                    <ellipse cx="100" cy="110" rx="70" ry="80" fill="#AEC6CF" />
                    <!-- Belly -->
                    <ellipse cx="100" cy="130" rx="50" ry="50" fill="#fff" opacity="0.8" />
                    <!-- Wings -->
                    <path d="M 30 110 C 10 130, 20 160, 40 150 C 40 150, 45 130, 30 110" fill="#8cb3c2" class="animate-wiggle" style="transform-origin: 30px 110px;" />
                    <path d="M 170 110 C 190 130, 180 160, 160 150 C 160 150, 155 130, 170 110" fill="#8cb3c2" class="animate-wiggle" style="transform-origin: 170px 110px; animation-delay: 0.5s;" />
                    <!-- Eyes -->
                    <circle cx="75" cy="85" r="15" fill="#fff" />
                    <circle cx="125" cy="85" r="15" fill="#fff" />
                    <circle cx="75" cy="85" r="7" fill="#333" class="eye" id="left-pupil"/>
                    <circle cx="125" cy="85" r="7" fill="#333" class="eye" id="right-pupil"/>
                    <!-- Sparkle in eyes -->
                    <circle cx="72" cy="82" r="2" fill="#fff" />
                    <circle cx="122" cy="82" r="2" fill="#fff" />
                    <!-- Beak -->
                    <polygon points="90,100 110,100 100,115" fill="#FFB347" />
                    <!-- Feathers on head -->
                    <path d="M 85 40 Q 100 20 115 40" fill="none" stroke="#AEC6CF" stroke-width="6" stroke-linecap="round" />
                    <!-- Blush -->
                    <ellipse cx="55" cy="100" rx="8" ry="4" fill="#FFD1DC" opacity="0.8" />
                    <ellipse cx="145" cy="100" rx="8" ry="4" fill="#FFD1DC" opacity="0.8" />
                </svg>
                
                <!-- Mascot Speech Bubble -->
                <div id="mascot-speech" class="absolute -top-4 -right-12 bg-white px-3 py-2 rounded-2xl rounded-bl-none shadow-md text-xs font-bold text-indigo-700 opacity-0 transition-opacity duration-300 transform scale-0 origin-bottom-left">
                    Hi! I'm Pip! 🦉
                </div>
            </div>

            <!-- Stats / Info -->
            <div class="bg-white/60 p-4 rounded-2xl shadow-inner w-full">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-sm font-bold text-gray-600"><i class="fas fa-fire text-pastel-orange mr-1"></i> Streak</span>
                    <span class="text-sm font-extrabold text-pastel-orange">5 Days!</span>
                </div>
                <div class="flex items-center justify-between">
                    <span class="text-sm font-bold text-gray-600"><i class="fas fa-star text-pastel-yellow mr-1 drop-shadow-sm"></i> Points</span>
                    <span class="text-sm font-extrabold text-pastel-yellow drop-shadow-sm" style="-webkit-text-stroke: 0.5px #d4d455;">120 XP</span>
                </div>
            </div>

            <!-- Motivation -->
            <div class="mt-auto pt-6 text-center">
                <p class="text-xs text-indigo-500 font-semibold italic">"Every mistake is a step forward!"</p>
            </div>
        </div>

        <div class="w-full md:w-2/3 flex flex-col bg-white/50 relative">
            
            <!-- Chat Header -->
            <div class="h-16 flex items-center justify-between px-6 bg-white/80 border-b border-gray-100 shadow-sm z-10">
                <div class="flex items-center">
                    <div class="w-3 h-3 rounded-full bg-pastel-green mr-2 animate-pulse"></div>
                    <span class="font-bold text-gray-700">Pip is online</span>
                </div>
                <div class="flex gap-3">
                    <button class="w-8 h-8 rounded-full bg-pastel-pink/30 text-pink-600 hover:bg-pastel-pink/60 transition flex items-center justify-center shadow-sm" title="Pronunciation Guide">
                        <i class="fas fa-volume-up"></i>
                    </button>
                    <button class="w-8 h-8 rounded-full bg-pastel-purple/30 text-purple-600 hover:bg-pastel-purple/60 transition flex items-center justify-center shadow-sm" title="Grammar Tips">
                        <i class="fas fa-book-open"></i>
                    </button>
                </div>
            </div>

            <div id="chat-box" class="flex-1 p-6 overflow-y-auto chat-scroll flex flex-col gap-4">
                
                <!-- Date divider -->
                <div class="flex justify-center my-2">
                    <span class="text-xs bg-gray-100 px-3 py-1 rounded-full text-gray-400 font-semibold shadow-inner">Today</span>
                </div>

                <!-- Typing indicator (hidden by default) -->
                <div id="typing-indicator" class="hidden items-end gap-2">
                     <div class="w-8 h-8 rounded-full bg-pastel-blue flex items-center justify-center shadow-sm mb-1">
                        <i class="fas fa-robot text-white text-xs"></i>
                    </div>
                    <div class="bg-pastel-blue/20 px-4 py-4 rounded-2xl rounded-bl-sm flex gap-1 shadow-sm w-16">
                        <div class="w-2 h-2 bg-pastel-blue rounded-full typing-dot"></div>
                        <div class="w-2 h-2 bg-pastel-blue rounded-full typing-dot"></div>
                        <div class="w-2 h-2 bg-pastel-blue rounded-full typing-dot"></div>
                    </div>
                </div>

            </div>

            <div class="p-4 bg-white/80 border-t border-gray-100 z-10">
                <form id="chat-form" class="relative flex items-center">
                    <input 
                        type="text" 
                        id="user-input"
                        class="w-full bg-gray-50 border-2 border-pastel-blue/30 text-gray-700 text-sm rounded-full focus:ring-4 focus:ring-pastel-blue/20 focus:border-pastel-blue block pl-6 pr-14 py-4 shadow-inner outline-none transition-all font-medium placeholder-gray-400" 
                        placeholder="Type your message here..."
                        autocomplete="off"
                        required
                    >
                    
                    <button type="submit" class="absolute right-2 bg-gradient-to-r from-pastel-blue to-indigo-300 text-white w-10 h-10 rounded-full flex items-center justify-center hover:shadow-lg hover:scale-105 transition-all shadow-md group">
                        <i class="fas fa-paper-plane group-hover:translate-x-0.5 group-hover:-translate-y-0.5 transition-transform"></i>
                    </button>
                </form>
                <div class="text-center mt-2">
                    <span class="text-[10px] text-gray-400 font-semibold uppercase tracking-wider">Powered by Gemini ✨</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

    <script>
        // Mascot interactions
        function pokeMascot() {
            const messages = ["I'm listening! 🦉", "You got this! ✨", "Hoot hoot! 🌟", "Keep studying! 📚"];
            const mascotSpeech = document.getElementById('mascot-speech');
            mascotSpeech.textContent = messages[Math.floor(Math.random() * messages.length)];
            
            mascotSpeech.classList.remove('opacity-0', 'scale-0');
            mascotSpeech.classList.add('opacity-100', 'scale-100');
            
            // Make eyes look around
            document.getElementById('left-pupil').setAttribute('cx', '80');
            document.getElementById('right-pupil').setAttribute('cx', '130');

            setTimeout(() => {
                mascotSpeech.classList.remove('opacity-100', 'scale-100');
                mascotSpeech.classList.add('opacity-0', 'scale-0');
                
                // Reset eyes
                document.getElementById('left-pupil').setAttribute('cx', '75');
                document.getElementById('right-pupil').setAttribute('cx', '125');
            }, 2000);
        }

        // Interactive Mascot Eyes following mouse
        document.addEventListener('mousemove', (e) => {
            const mouseX = e.clientX;
            const mouseY = e.clientY;
            
            const mascotContainer = document.getElementById('mascot-container');
            if(!mascotContainer) return;
            
            const rect = mascotContainer.getBoundingClientRect();
            const mascotCenterX = rect.left + rect.width / 2;
            const mascotCenterY = rect.top + rect.height / 2;

            const angle = Math.atan2(mouseY - mascotCenterY, mouseX - mascotCenterX);
            
            // Limit the distance the pupil can move
            const distance = Math.min(3, Math.hypot(mouseX - mascotCenterX, mouseY - mascotCenterY) / 50);

            const eyeOffsetX = Math.cos(angle) * distance;
            const eyeOffsetY = Math.sin(angle) * distance;

            // Base positions
            const leftBaseX = 75; const leftBaseY = 85;
            const rightBaseX = 125; const rightBaseY = 85;

            document.getElementById('left-pupil').setAttribute('cx', leftBaseX + eyeOffsetX);
            document.getElementById('left-pupil').setAttribute('cy', leftBaseY + eyeOffsetY);
            
            document.getElementById('right-pupil').setAttribute('cx', rightBaseX + eyeOffsetX);
            document.getElementById('right-pupil').setAttribute('cy', rightBaseY + eyeOffsetY);
        });
    </script>
</body>
</html>
